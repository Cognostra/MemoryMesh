name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Check docs
        run: bun run docs:check

      - name: Check public skills
        run: bun run skills:check

      - name: Run tests
        run: bun test

      - name: Run benchmark harness
        run: bun run bench

      - name: Generate proof artifacts
        run: bun run proof

      - name: Run release check
        run: bun run release-check
