name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - artifact_name: memorymesh-linux-x64
            build_target: linux-x64
          - artifact_name: memorymesh-linux-arm64
            build_target: linux-arm64
          - artifact_name: memorymesh-darwin-x64
            build_target: darwin-x64
          - artifact_name: memorymesh-darwin-arm64
            build_target: darwin-arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Build artifact
        run: bash ./scripts/build-release.sh "${{ matrix.build_target }}"

      - name: Package artifact
        run: bash ./scripts/package-release.sh "dist/${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}
            dist/${{ matrix.artifact_name }}.sha256
            dist/${{ matrix.artifact_name }}.tar.gz
            dist/${{ matrix.artifact_name }}.tar.gz.sha256

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directories
        run: |
          find dist -mindepth 2 -type f -exec mv {} dist/ \;

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/memorymesh-linux-x64
            dist/memorymesh-linux-x64.sha256
            dist/memorymesh-linux-x64.tar.gz
            dist/memorymesh-linux-x64.tar.gz.sha256
            dist/memorymesh-linux-arm64
            dist/memorymesh-linux-arm64.sha256
            dist/memorymesh-linux-arm64.tar.gz
            dist/memorymesh-linux-arm64.tar.gz.sha256
            dist/memorymesh-darwin-x64
            dist/memorymesh-darwin-x64.sha256
            dist/memorymesh-darwin-x64.tar.gz
            dist/memorymesh-darwin-x64.tar.gz.sha256
            dist/memorymesh-darwin-arm64
            dist/memorymesh-darwin-arm64.sha256
            dist/memorymesh-darwin-arm64.tar.gz
            dist/memorymesh-darwin-arm64.tar.gz.sha256
